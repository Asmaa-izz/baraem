name: baraem
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  go_router: ^17.3.0
  drift: 2.34.0 # pinned to match drift_dev 2.34.0 (analyzer 12, coexists with riverpod_generator)
  drift_flutter: ^0.3.1
  path_provider: ^2.1.6
  just_audio: ^0.10.6
  flutter_tts: ^4.2.5
  flutter_animate: ^4.5.2
  intl: ^0.20.2
  uuid: ^4.5.3
  crypto: ^3.0.7
  image_picker: ^1.2.3
  record: ^7.1.1
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  build_runner: ^2.15.1
  drift_dev: 2.34.0 # pinned to match drift 2.34.0
  riverpod_generator: ^4.0.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  # enables gen-l10n from lib/core/l10n/app_ar.arb (see l10n.yaml)
  generate: true

  assets:
    - assets/content/content.json
    - assets/content/praise/
    - assets/content/household/spoon/
    - assets/content/household/spoon/audio/
    - assets/content/household/cup/
    - assets/content/household/cup/audio/
    - assets/content/household/plate/
    - assets/content/household/plate/audio/
    - assets/content/household/fork/
    - assets/content/household/fork/audio/
    - assets/content/household/pot/
    - assets/content/household/pot/audio/
    - assets/content/household/bottle/
    - assets/content/household/bottle/audio/
    - assets/content/household/knife/
    - assets/content/household/knife/audio/
    - assets/content/household/pan/
    - assets/content/household/pan/audio/
    - assets/content/household/kettle/
    - assets/content/household/kettle/audio/
    - assets/content/household/tray/
    - assets/content/household/tray/audio/
    - assets/content/animals/cat/
    - assets/content/animals/cat/audio/
    - assets/content/animals/dog/
    - assets/content/animals/dog/audio/
    - assets/content/animals/bird/
    - assets/content/animals/bird/audio/
    - assets/content/animals/horse/
    - assets/content/animals/horse/audio/
    - assets/content/animals/duck/
    - assets/content/animals/duck/audio/
    - assets/content/animals/rabbit/
    - assets/content/animals/rabbit/audio/
    - assets/content/vegetables/tomato/
    - assets/content/vegetables/tomato/audio/
    - assets/content/vegetables/cucumber/
    - assets/content/vegetables/cucumber/audio/
    - assets/content/vegetables/carrot/
    - assets/content/vegetables/carrot/audio/
    - assets/content/vegetables/potato/
    - assets/content/vegetables/potato/audio/
    - assets/content/vegetables/onion/
    - assets/content/vegetables/onion/audio/
    - assets/content/vegetables/pepper/
    - assets/content/vegetables/pepper/audio/
    - assets/content/fruits/apple/
    - assets/content/fruits/apple/audio/
    - assets/content/fruits/banana/
    - assets/content/fruits/banana/audio/
    - assets/content/fruits/orange/
    - assets/content/fruits/orange/audio/
    - assets/content/fruits/grapes/
    - assets/content/fruits/grapes/audio/
    - assets/content/fruits/strawberry/
    - assets/content/fruits/strawberry/audio/
  fonts:
    # Display / the word the child sees — rounded, friendly (variable weight axis)
    - family: Baloo Bhaijaan 2
      fonts:
        - asset: assets/fonts/BalooBhaijaan2-VariableFont_wght.ttf
    # Body / UI / reports — clean, high legibility at small sizes
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
